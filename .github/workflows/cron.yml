name: Cron Jobs

on:
  schedule:
    # Run every 10 minutes to keep data fresh
    - cron: '*/10 * * * *'
  workflow_dispatch: # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refresh news feed
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/news" || echo "News fetch failed"

      - name: Refresh prices
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/prices" || echo "Prices fetch failed"

      - name: Run AI analysis (warms CDN cache for /api/latest)
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/analyze" || echo "Analysis failed"
