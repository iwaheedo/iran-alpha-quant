name: Cron Jobs

on:
  schedule:
    # Run every 10 minutes to keep data fresh
    - cron: '*/10 * * * *'
  workflow_dispatch: # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refresh news feed
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/news" || echo "News fetch failed"

      - name: Refresh prices
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/prices" || echo "Prices fetch failed"

      - name: Invalidate analysis cache
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/analyze" || echo "Cache invalidation failed"

      - name: Warm analysis cache (triggers fresh analysis)
        run: |
          curl -sf --max-time 90 \
            "${{ secrets.APP_URL }}/api/latest" > /dev/null || echo "Cache warm failed"
