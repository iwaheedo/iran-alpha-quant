name: Cron Jobs

on:
  schedule:
    # Run every 12 hours to stay within 10K tokens/day budget
    - cron: '0 */12 * * *'
  workflow_dispatch: # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run analysis and populate CDN cache
        run: |
          echo "Triggering full analysis via /api/latest..."

          # Cache-Control: no-cache bypasses CDN so request reaches origin.
          # X-Cron-Secret triggers full analysis (fetch + AI + save).
          # The response contains all data and gets cached by CDN for 10 min.
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --max-time 120 \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Cache-Control: no-cache" \
            "${{ secrets.APP_URL }}/api/latest")

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Request failed with status $HTTP_CODE"
            cat /tmp/response.json 2>/dev/null || true
            exit 1
          fi

          # Show summary
          TRADES=$(python3 -c "import json; d=json.load(open('/tmp/response.json')); print(len(d.get('trades',[])))" 2>/dev/null || echo "?")
          NEWS=$(python3 -c "import json; d=json.load(open('/tmp/response.json')); print(len(d.get('news',[])))" 2>/dev/null || echo "?")
          PREDS=$(python3 -c "import json; d=json.load(open('/tmp/response.json')); print(len(d.get('predictions',[])))" 2>/dev/null || echo "?")
          echo "Result: ${TRADES} trades, ${NEWS} news, ${PREDS} predictions"
